<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>모닝 미션</title>
  <style>
    :root{
      --bg:#0f172a;--panel:#111827;--panel2:#1f2937;--line:#334155;--text:#f8fafc;--sub:#94a3b8;
      --accent:#22d3ee;--accent2:#f59e0b;--ok:#22c55e;--danger:#ef4444;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;background:linear-gradient(180deg,#020617,#0f172a 30%,#111827);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Noto Sans KR,sans-serif}
    body{overflow:hidden}
    button,input{font:inherit}
    .app{max-width:480px;height:100%;margin:0 auto;display:flex;flex-direction:column;position:relative}
    .top{padding:calc(env(safe-area-inset-top,0px) + 12px) 14px 10px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(2,6,23,.8);backdrop-filter:blur(8px)}
    .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .title{font-size:22px;font-weight:800}
    .sub{font-size:12px;color:var(--sub)}
    .iconbtn{border:1px solid rgba(255,255,255,.1);background:var(--panel2);color:var(--text);padding:10px 12px;border-radius:12px;cursor:pointer}
    .progress{margin-top:10px;background:#0b1220;border:1px solid rgba(255,255,255,.08);border-radius:999px;height:14px;overflow:hidden}
    .bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--ok));transition:width .35s ease}
    .content{flex:1;min-height:0;overflow:auto;padding:12px 14px 100px}
    .hero{display:grid;grid-template-columns:1fr 160px;gap:12px;align-items:start}
    .card{background:rgba(17,24,39,.9);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,.22)}
    .figureBox{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px}
    .figureTitle{font-size:12px;color:var(--sub);margin-bottom:8px}
    .figureStage{width:120px;height:170px;position:relative;display:flex;align-items:center;justify-content:center}
    .part{position:absolute;opacity:.14;transform:translateY(6px) scale(.98);transition:all .35s ease;filter:grayscale(.25)}
    .part.show{opacity:1;transform:translateY(0) scale(1);filter:none}
    .head{top:0;width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fde68a,#f59e0b 70%,#b45309);border:3px solid #78350f}
    .hair{position:absolute;top:-6px;left:8px;width:56px;height:22px;border-radius:20px 20px 8px 8px;background:#3f2a1e}
    .eye{position:absolute;top:28px;width:8px;height:8px;border-radius:50%;background:#111827}
    .eye.left{left:18px}.eye.right{right:18px}
    .mouth{position:absolute;left:50%;top:46px;transform:translateX(-50%);width:22px;height:10px;border-bottom:3px solid #7c2d12;border-radius:0 0 20px 20px}
    .body{top:64px;width:96px;height:62px;border-radius:18px 18px 14px 14px;background:linear-gradient(180deg,#38bdf8,#0ea5e9);border:3px solid #0c4a6e}
    .body:before,.body:after{content:'';position:absolute;top:10px;width:22px;height:54px;border-radius:14px;background:#fde68a;border:3px solid #78350f}
    .body:before{left:-12px}.body:after{right:-12px}
    .badge{position:absolute;left:50%;top:16px;transform:translateX(-50%);background:#f8fafc;color:#0369a1;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800}
    .legs{top:122px;width:92px;height:46px}
    .leg{position:absolute;bottom:0;width:34px;height:46px;border-radius:12px;background:linear-gradient(180deg,#475569,#1e293b);border:3px solid #0f172a}
    .leg.left{left:8px}.leg.right{right:8px}
    .brickCount{margin-top:10px;font-size:13px;font-weight:700;color:#fde68a}
    .floatZone{position:relative;height:28px;width:100%;overflow:visible}
    .floatBrick{position:absolute;left:50%;top:0;transform:translate(-50%,0);padding:6px 10px;border-radius:12px;background:#f59e0b;color:#111827;font-size:12px;font-weight:800;animation:fly .8s ease forwards}
    @keyframes fly{0%{opacity:0;transform:translate(-50%,20px) scale(.7)}20%{opacity:1}100%{opacity:0;transform:translate(90px,-50px) scale(1)}}
    .sectionTitle{font-size:13px;font-weight:800;margin-bottom:8px;color:#cbd5e1}
    .missionList{display:flex;flex-direction:column;gap:10px}
    .mission{display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;background:#0b1220;border:1px solid rgba(255,255,255,.07);cursor:pointer;touch-action:manipulation}
    .mission.done{opacity:.56}
    .emoji{width:42px;height:42px;border-radius:12px;background:#1e293b;display:flex;align-items:center;justify-content:center;font-size:22px;flex:none}
    .mMain{flex:1;min-width:0}.mName{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mMeta{font-size:12px;color:var(--sub);margin-top:2px}
    .chk{width:28px;height:28px;border-radius:10px;border:2px solid #475569;display:flex;align-items:center;justify-content:center;color:transparent;flex:none}
    .mission.done .chk{background:var(--ok);border-color:var(--ok);color:#052e16}
    .hint{font-size:12px;color:var(--sub);text-align:center;margin-top:8px}
    .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .gallery img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:12px;border:1px solid rgba(255,255,255,.1)}
    .overlay{position:fixed;inset:0;background:linear-gradient(180deg,#020617,#0f172a);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
    .startCard{width:min(100%,420px);text-align:center;background:rgba(17,24,39,.96);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    .startBtn{width:100%;margin-top:18px;border:none;background:linear-gradient(90deg,var(--accent),#67e8f9);color:#082f49;font-weight:900;padding:16px 18px;border-radius:16px;cursor:pointer;touch-action:manipulation}
    .muted{color:var(--sub);font-size:13px;line-height:1.45}
    .sheet{position:fixed;inset:auto 0 0 0;max-width:480px;margin:0 auto;background:#0b1220;border-top:1px solid rgba(255,255,255,.08);border-radius:22px 22px 0 0;z-index:40;padding:16px;transform:translateY(110%);transition:transform .25s ease;left:50%;translate:-50% 0;max-height:82vh;overflow:auto}
    .sheet.show{transform:translateY(0)}
    .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;display:none}
    .backdrop.show{display:block}
    .sheet input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #334155;background:#111827;color:#fff;margin-bottom:8px}
    .sheetRow{display:flex;gap:8px;align-items:center}
    .small{font-size:12px;color:var(--sub)}
    .actions{display:flex;gap:8px;position:sticky;bottom:0;background:#0b1220;padding-top:10px}
    .btn{flex:1;border:none;border-radius:14px;padding:13px 14px;font-weight:800;cursor:pointer}
    .btn.primary{background:var(--accent);color:#083344}.btn.gray{background:#1f2937;color:#e2e8f0}.btn.warn{background:#7f1d1d;color:#fee2e2}
    .cameraWrap{display:none;flex-direction:column;gap:10px;align-items:center}
    .cameraWrap video{width:100%;max-height:52vh;border-radius:16px;background:#000}
    .cameraWrap.show{display:flex}
    .fab{position:fixed;right:max(16px,calc((100vw - 480px)/2 + 16px));bottom:calc(env(safe-area-inset-bottom,0px) + 14px);display:flex;gap:8px;z-index:20}
    .fab button{border:none;border-radius:999px;padding:14px 16px;background:#22d3ee;color:#083344;font-weight:900;box-shadow:0 10px 20px rgba(0,0,0,.25);cursor:pointer}
    @media (max-width:380px){ .hero{grid-template-columns:1fr} .figureBox{min-height:200px} .fab{right:14px} }
  </style>
</head>
<body>
<div class="overlay" id="startOverlay">
  <div class="startCard">
    <div style="font-size:54px">🌞</div>
    <div class="title" style="margin-top:6px">모닝 미션</div>
    <p class="muted" style="margin:12px 0 0">시작 버튼을 누르면 바로 들어가도록 다시 만들었어. GitHub/Vercel 배포용 정적 앱이라 모바일에서도 안정적으로 동작해.</p>
    <button class="startBtn" id="startBtn" type="button">시작하기</button>
  </div>
</div>

<div class="app">
  <div class="top">
    <div class="row">
      <div>
        <div class="title" id="appTitle">모닝 미션</div>
        <div class="sub" id="clockText">--:--</div>
      </div>
      <button class="iconbtn" id="editOpenBtn" type="button">편집</button>
    </div>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="sub" id="progressText" style="margin-top:6px">0 / 0 완료</div>
  </div>

  <div class="content">
    <div class="hero">
      <div class="card">
        <div class="sectionTitle">오늘의 미션</div>
        <div class="missionList" id="missionList"></div>
        <div class="hint" id="pageHint"></div>
      </div>
      <div class="card figureBox">
        <div class="figureTitle">가운데 조립</div>
        <div class="floatZone" id="floatZone"></div>
        <div class="figureStage" aria-label="피규어 조립 영역">
          <div class="part head" id="part-head">
            <div class="hair"></div><div class="eye left"></div><div class="eye right"></div><div class="mouth"></div>
          </div>
          <div class="part body" id="part-body"><div class="badge">GO!</div></div>
          <div class="part legs" id="part-legs"><div class="leg left"></div><div class="leg right"></div></div>
        </div>
        <div class="brickCount" id="brickCount">획득 블럭 0개</div>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="sectionTitle">인증샷 보관함</div>
      <div class="gallery" id="gallery"></div>
      <div class="small" style="margin-top:8px">같은 브라우저에서 다시 열어도 남아 있어.</div>
    </div>
  </div>
</div>

<div class="fab">
  <button type="button" id="voiceBtn">🔊 음성</button>
  <button type="button" id="cameraBtn">📷 인증샷</button>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="sheet" id="editSheet">
  <div class="sectionTitle">미션 편집</div>
  <div class="small" style="margin-bottom:10px">미션 이름을 바꾸거나 추가할 수 있어.</div>
  <div id="editList"></div>
  <div class="sheetRow" style="margin-top:6px">
    <input id="newMissionName" placeholder="새 미션 이름" maxlength="20" />
    <button class="iconbtn" type="button" id="addMissionBtn">추가</button>
  </div>
  <div class="actions">
    <button class="btn gray" type="button" id="closeEditBtn">닫기</button>
    <button class="btn primary" type="button" id="saveEditBtn">저장</button>
  </div>
</div>

<div class="sheet" id="cameraSheet">
  <div class="sectionTitle">인증샷 찍기</div>
  <div class="small" style="margin-bottom:10px">카메라가 안 되면 아래 파일 선택으로도 저장할 수 있어.</div>
  <div class="cameraWrap" id="cameraWrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="actions" style="width:100%">
      <button class="btn gray" type="button" id="closeCameraBtn">닫기</button>
      <button class="btn primary" type="button" id="snapBtn">촬영</button>
    </div>
  </div>
  <input type="file" accept="image/*" capture="user" id="filePick" />
  <canvas id="canvas" style="display:none"></canvas>
</div>

<script>
(() => {
  const DEFAULT = [
    {id:1,name:'옷 입기',emoji:'🥋'},
    {id:2,name:'세수하기',emoji:'💦'},
    {id:3,name:'양치하기',emoji:'🪥'},
    {id:4,name:'아침밥 먹기',emoji:'🍚'},
    {id:5,name:'책 읽기',emoji:'📚'},
    {id:6,name:'가방 챙기기',emoji:'🎒'}
  ];

  const $ = (id) => document.getElementById(id);
  const state = {
    started:false,
    voice:true,
    tasks:load('stable_tasks', DEFAULT),
    done:load('stable_done', {}),
    bricks:load('stable_bricks', 0),
    photos:load('stable_photos', []),
    page:0,
    stream:null,
    draft:null
  };

  function load(key, fallback){
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
  }
  function save(){
    localStorage.setItem('stable_tasks', JSON.stringify(state.tasks));
    localStorage.setItem('stable_done', JSON.stringify(state.done));
    localStorage.setItem('stable_bricks', JSON.stringify(state.bricks));
    localStorage.setItem('stable_photos', JSON.stringify(state.photos.slice(0,12)));
  }
  function updateClock(){
    const now = new Date();
    $('clockText').textContent = now.toLocaleString('ko-KR', { hour:'2-digit', minute:'2-digit', weekday:'short' });
  }
  updateClock(); setInterval(updateClock, 30000);

  function speak(text){
    if(!state.voice || !('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.92;
    u.pitch = 1.02;
    const voices = speechSynthesis.getVoices();
    const preferred = voices.find(v => /^en/i.test(v.lang) && /Natural|Enhanced|Online|Siri/i.test(v.name)) || voices.find(v => /^en/i.test(v.lang));
    if(preferred) u.voice = preferred;
    speechSynthesis.speak(u);
  }
  if ('speechSynthesis' in window) {
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }

  function getCompleted(){ return state.tasks.filter(t => state.done[t.id]).length; }
  function getTotal(){ return state.tasks.length; }
  function visibleTasks(){
    const undone = state.tasks.filter(t => !state.done[t.id]);
    const groups = [];
    for(let i=0;i<undone.length;i+=3) groups.push(undone.slice(i,i+3));
    return groups[state.page] || [];
  }
  function syncPage(){
    const undone = state.tasks.filter(t => !state.done[t.id]);
    const groups = Math.max(1, Math.ceil(undone.length / 3));
    if(state.page >= groups) state.page = groups - 1;
  }

  function renderFigure(){
    const done = getCompleted();
    const total = Math.max(1, getTotal());
    const ratio = done / total;
    $('part-head').classList.toggle('show', ratio > 0);
    $('part-body').classList.toggle('show', ratio >= 0.34);
    $('part-legs').classList.toggle('show', ratio >= 0.67 || done === total);
    $('brickCount').textContent = `획득 블럭 ${state.bricks}개`;
  }

  function renderMissions(){
    syncPage();
    const list = $('missionList');
    list.innerHTML = '';
    const items = visibleTasks();
    items.forEach(task => {
      const done = !!state.done[task.id];
      const div = document.createElement('button');
      div.type = 'button';
      div.className = 'mission' + (done ? ' done' : '');
      div.innerHTML = `<div class="emoji">${task.emoji}</div><div class="mMain"><div class="mName">${task.name}</div><div class="mMeta">터치해서 완료</div></div><div class="chk">✓</div>`;
      div.addEventListener('click', () => toggleMission(task.id));
      list.appendChild(div);
    });
    const undoneCount = state.tasks.filter(t => !state.done[t.id]).length;
    $('pageHint').textContent = undoneCount > 3 ? '현재 3개씩 보여주고 있어. 완료하면 다음 미션이 자동으로 보여.' : (undoneCount === 0 ? '모든 미션 완료!' : '');
    const done = getCompleted(), total = getTotal();
    $('bar').style.width = `${total ? (done/total)*100 : 0}%`;
    $('progressText').textContent = `${done} / ${total} 완료`;
    renderFigure();
    if(done === total && total > 0) {
      speak('All missions complete. Time for your photo.');
    }
  }

  function renderGallery(){
    $('gallery').innerHTML = state.photos.slice(0,12).map(src => `<img src="${src}" alt="인증샷">`).join('');
  }

  function brickAnim(){
    const colors = ['#f59e0b','#ef4444','#22c55e','#38bdf8','#a855f7'];
    const block = document.createElement('div');
    block.className = 'floatBrick';
    block.style.background = colors[Math.floor(Math.random()*colors.length)];
    block.textContent = '🧱 +1';
    $('floatZone').appendChild(block);
    setTimeout(() => block.remove(), 820);
  }

  function toggleMission(id){
    if(state.done[id]) return;
    state.done[id] = true;
    state.bricks += 1;
    brickAnim();
    save();
    const undone = state.tasks.filter(t => !state.done[t.id]).length;
    if(undone % 3 === 0 && undone > 0) state.page += 1;
    renderMissions();
  }

  function openSheet(which){
    $('backdrop').classList.add('show');
    $(which).classList.add('show');
  }
  function closeSheets(){
    $('backdrop').classList.remove('show');
    $('editSheet').classList.remove('show');
    $('cameraSheet').classList.remove('show');
    stopCamera();
  }

  function renderEdit(){
    state.draft = state.tasks.map(t => ({...t}));
    const wrap = $('editList');
    wrap.innerHTML = '';
    state.draft.forEach((task, idx) => {
      const row = document.createElement('div');
      row.className = 'sheetRow';
      row.innerHTML = `<input value="${escapeHtml(task.emoji)}" maxlength="4" style="max-width:72px"><input value="${escapeHtml(task.name)}" maxlength="20"><button class="iconbtn" type="button">삭제</button>`;
      const [emojiInput, nameInput, delBtn] = row.querySelectorAll('input,button');
      emojiInput.addEventListener('input', e => state.draft[idx].emoji = e.target.value || '⭐');
      nameInput.addEventListener('input', e => state.draft[idx].name = e.target.value || '새 미션');
      delBtn.addEventListener('click', () => { state.draft.splice(idx,1); renderEdit(); });
      wrap.appendChild(row);
    });
  }
  function escapeHtml(s){ return String(s).replace(/[&<>\"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

  async function openCamera(){
    openSheet('cameraSheet');
    $('cameraWrap').classList.remove('show');
    try {
      if(!navigator.mediaDevices?.getUserMedia) throw new Error('not supported');
      state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio:false });
      $('video').srcObject = state.stream;
      $('cameraWrap').classList.add('show');
    } catch (e) {
      // fallback remains available via file input
    }
  }
  function stopCamera(){
    if(state.stream){ state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }
    $('video').srcObject = null;
  }
  function storePhoto(src){
    state.photos.unshift(src);
    state.photos = state.photos.slice(0,12);
    save();
    renderGallery();
  }
  function takePhoto(){
    const v = $('video');
    if(!v.videoWidth) return;
    const c = $('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(v, 0, 0);
    storePhoto(c.toDataURL('image/jpeg', 0.92));
    closeSheets();
  }

  function startApp(){
    if(state.started) return;
    state.started = true;
    $('startOverlay').style.display = 'none';
    speak('Good morning. Let us start your mission.');
  }

  $('startBtn').addEventListener('click', startApp, {passive:true});
  $('startBtn').addEventListener('touchend', (e) => { e.preventDefault(); startApp(); }, {passive:false});
  $('editOpenBtn').addEventListener('click', () => { renderEdit(); openSheet('editSheet'); });
  $('closeEditBtn').addEventListener('click', closeSheets);
  $('saveEditBtn').addEventListener('click', () => {
    state.tasks = state.draft.filter(t => t.name && t.name.trim()).map((t,i) => ({ id: Date.now() + i, name: t.name.trim(), emoji: (t.emoji || '⭐').trim() || '⭐' }));
    state.done = {};
    state.page = 0;
    save();
    closeSheets();
    renderMissions();
  });
  $('addMissionBtn').addEventListener('click', () => { if(!state.draft) state.draft=[]; state.draft.push({id:Date.now(), name:'새 미션', emoji:'⭐'}); renderEdit(); });
  $('cameraBtn').addEventListener('click', openCamera);
  $('closeCameraBtn').addEventListener('click', closeSheets);
  $('snapBtn').addEventListener('click', takePhoto);
  $('backdrop').addEventListener('click', closeSheets);
  $('voiceBtn').addEventListener('click', () => { state.voice = !state.voice; $('voiceBtn').textContent = state.voice ? '🔊 음성' : '🔇 음성'; });
  $('filePick').addEventListener('change', (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = () => { storePhoto(reader.result); closeSheets(); };
    reader.readAsDataURL(file);
  });

  renderMissions();
  renderGallery();
})();
</script>
</body>
</html>
